services:
  postgres:
    image: pgvector/pgvector:pg18
    environment:
      POSTGRES_USER: sourcerag
      POSTGRES_PASSWORD: sourcerag
      POSTGRES_DB: sourcerag
    volumes:
      - pg_data:/var/lib/postgresql
    ports:
      - "127.0.0.1:5433:5432" # optional: inspect the index with psql at localhost:5433
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sourcerag -d sourcerag"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  indexer:
    build: ./indexer
    env_file: .env
    environment:
      DATABASE_URL: postgresql://sourcerag:sourcerag@postgres:5432/sourcerag
    volumes:
      - ./config:/config:ro
      - repo_data:/data/repos
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build: ./api
    env_file: .env
    environment:
      DATABASE_URL: postgresql://sourcerag:sourcerag@postgres:5432/sourcerag
    ports:
      # Loopback by default: auth is optional (AGENT_API_KEY / OAUTH_ISSUER,
      # see .env.example), so without it this binding is the only thing
      # keeping the indexed source code off the LAN. Only widen this bind
      # with auth configured, and set PUBLIC_BASE_URL accordingly.
      - "127.0.0.1:4141:8000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pg_data:
  repo_data:
