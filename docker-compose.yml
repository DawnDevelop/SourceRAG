services:
  chroma:
    image: chromadb/chroma:0.5.23 # pinned to match chromadb-client==0.5.23 in api/ and indexer/
    volumes:
      - chroma_data:/chroma/chroma
    ports:
      - "8001:8000" # optional: browse/debug the raw Chroma API at localhost:8001
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v2/heartbeat"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  indexer:
    build: ./indexer
    env_file: .env
    volumes:
      - ./config:/config:ro
      - repo_data:/data/repos
    depends_on:
      chroma:
        condition: service_healthy

  api:
    build: ./api
    env_file: .env
    ports:
      - "8080:8000"
    depends_on:
      chroma:
        condition: service_healthy

volumes:
  chroma_data:
  repo_data:
